<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMS 运营中心 V1.1</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://lf-scm-cn.feishucdn.com/lark/op/h5-js-sdk-1.5.38.js"></script>
  </head>
  <body>
    <div class="color-rail" aria-hidden="true"></div>
    <main class="app-shell" aria-label="OMS Operating Center V1.1">
      <aside class="brand-sidebar" aria-label="凰家品牌导航">
        <a class="brand-lockup" href="./" aria-label="凰家 LOGO 品牌入口">
          <span class="brand-mark" data-logo-source="github">凰</span>
          <span>
            <strong>凰家运营中心</strong>
            <em>HUANGJIA OMS</em>
          </span>
        </a>

        <nav class="side-nav" aria-label="经营总览导航">
          <a class="active" href="#scoreboardCards"><span class="nav-dot red"></span>经营总览</a>
          <a href="#overviewGrid"><span class="nav-dot blue"></span>财务总览</a>
          <a href="#overviewGrid"><span class="nav-dot green"></span>房态总览</a>
          <a href="#overviewGrid"><span class="nav-dot purple"></span>人效总览</a>
          <a href="#quickLinks"><span class="nav-dot orange"></span>风险预警</a>
        </nav>

        <div class="side-section">
          <p>工作台</p>
          <div id="sideWorkspaceList" class="side-workspace-list"></div>
        </div>

        <div class="side-account" aria-label="当前账号">
          <span class="avatar-dot">B</span>
          <div>
            <strong id="lockedUserName">OMS</strong>
            <span id="lockedUserRole">Feishu identity</span>
          </div>
        </div>
      </aside>

      <section class="dashboard-main">
        <header class="app-header">
          <div>
            <p class="eyebrow">凰家运营中心（OMS）V1.1</p>
            <h1 id="homeTitle">晚上好，主理办（你）</h1>
            <p id="homeSubtitle" class="subtitle">11个人，每人一个工作台，最后拼成一个运营中心</p>
          </div>
          <div class="time-chip" aria-label="当前时间">
            <span id="todayLabel">2026年7月</span>
            <strong id="todayClock">23:15</strong>
          </div>
        </header>

        <section id="scoreboardCards" class="scoreboard-grid" aria-label="顶部经营总览大数字卡片"></section>

        <section class="todo-band" aria-label="我的待办">
          <div class="section-title">
            <h2>我的待办</h2>
            <span id="workspaceStatus">business_schema</span>
          </div>
          <div id="priorityCards" class="priority-grid"></div>
        </section>

        <section class="workspace-section" aria-label="中部11岗位工作台">
          <div class="section-title">
            <h2>工作台矩阵</h2>
            <span>11岗位状态一眼可见</span>
          </div>
          <section id="workspaceCards" class="workspace-grid-v11" aria-label="11岗位工作台列表"></section>
        </section>

        <section class="overview-band" aria-label="底层统一运营中心汇总">
          <div class="section-title">
            <h2>运营中心总览</h2>
            <span>统一汇总</span>
          </div>
          <div class="overview-layout">
            <div id="overviewGrid" class="overview-grid"></div>
            <div id="quickLinks" class="quick-links"></div>
          </div>
          <p class="principle-strip">经营中心第一原则：不要落下客户，不要遗忘客户，让每一位妈妈都被用心服务</p>
        </section>
      </section>
    </main>
    <script src="./oms-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
