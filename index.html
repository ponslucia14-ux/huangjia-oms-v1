<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMS 每日工作台</title>
    <link rel="stylesheet" href="./styles.css?v=workspace-ia-v1-20260713" />
    <script src="https://lf-scm-cn.feishucdn.com/lark/op/h5-js-sdk-1.5.38.js"></script>
  </head>
  <body>
    <div class="color-rail" aria-hidden="true"></div>
    <header class="mobile-app-bar" aria-label="手机端工作台导航">
      <button id="mobileBackButton" class="mobile-icon-button" type="button" aria-label="返回上一页" title="返回上一页">‹</button>
      <div class="mobile-page-identity">
        <strong id="mobilePageTitle">首页工作台</strong>
        <span id="mobileUserSummary">身份识别中</span>
      </div>
      <button id="mobileMenuButton" class="mobile-icon-button" type="button" aria-label="打开业务菜单" aria-controls="businessNavigationDrawer" aria-expanded="false" title="打开业务菜单">☰</button>
    </header>
    <button id="mobileDrawerBackdrop" class="mobile-drawer-backdrop" type="button" aria-label="关闭业务菜单" hidden></button>
    <main id="homeTop" class="app-shell" aria-label="OMS 每日工作台">
      <aside id="businessNavigationDrawer" class="brand-sidebar" aria-label="凰家 OMS 导航" aria-hidden="false">
        <div class="mobile-drawer-heading">
          <strong>业务菜单</strong>
          <button id="mobileMenuCloseButton" class="mobile-icon-button" type="button" aria-label="关闭业务菜单" title="关闭业务菜单">×</button>
        </div>
        <a class="brand-lockup" href="./" aria-label="凰家品牌入口">
          <img
            class="brand-mark"
            src="./assets/huangjia-operations-brand.png?v=workspace-ia-v1-20260713"
            alt="凰家运营中心"
            width="48"
            height="48"
          />
          <span>
            <strong>凰家运营中心</strong>
            <em>OMS</em>
          </span>
        </a>

        <div class="side-section">
          <p>工作菜单</p>
          <div id="sideBusinessMenu" class="side-business-menu"></div>
        </div>

        <div class="side-account" aria-label="当前账号">
          <img
            id="lockedUserAvatar"
            class="avatar-dot account-avatar"
            src="./assets/emp001-boss-avatar.jpg?v=workspace-ia-v1-20260713"
            alt="石磊头像"
            width="44"
            height="44"
          />
          <div>
            <strong id="lockedUserName">OMS</strong>
            <span id="lockedUserRole">身份识别中</span>
          </div>
        </div>
      </aside>

      <section class="dashboard-main">
        <section id="mobileWorkspaceRoot" class="mobile-workspace-root" aria-live="polite" hidden></section>
        <nav id="compactPrimaryNav" class="compact-primary-nav" aria-label="核心业务导航">
          <a href="#home/首页工作台" data-nav-route="home" data-nav-key="home" data-nav-target="首页工作台">首页</a>
          <a href="#sales/销售经营" data-nav-route="sales" data-nav-key="sales" data-nav-target="销售经营">销售经营</a>
          <a href="#finance/资金经营" data-nav-route="finance" data-nav-key="finance" data-nav-target="资金经营">资金经营</a>
          <a href="#operations/运营经营" data-nav-route="operations" data-nav-key="operations" data-nav-target="运营经营">运营经营</a>
          <a href="#organization/组织执行" data-nav-route="organization" data-nav-key="organization" data-nav-target="组织执行">组织执行</a>
          <a href="#data/审计追溯" data-nav-route="data" data-nav-key="data" data-nav-target="审计追溯">审计追溯</a>
        </nav>
        <header class="app-header">
          <div>
            <p class="eyebrow">OMS 每日工作台</p>
            <h1 id="homeTitle">我现在应该做什么？</h1>
            <p id="homeSubtitle" class="subtitle">先看今日决策，再看经营状态和风险异常</p>
          </div>
          <div class="time-chip" aria-label="当前时间">
            <span id="todayLabel">2026年7月</span>
            <strong id="todayClock">23:15</strong>
          </div>
        </header>

        <section id="todayWorkSection" class="daily-task-section product-home-block" aria-label="今日工作">
          <div class="section-title">
            <h2>今日工作</h2>
            <span>今日最重要的 3 件事和待处理动作</span>
          </div>
          <div id="todayWorkData" class="home-data-strip" aria-label="现在发生什么"></div>
          <section id="scoreboardCards" class="scoreboard-grid daily-task-grid" aria-label="今日必须处理任务"></section>
        </section>

        <section id="businessFlowSection" class="todo-band product-home-block" aria-label="经营状态">
          <div class="section-title">
            <h2>经营状态</h2>
            <span id="workspaceStatus">房态 / 财务 / 销售 / 服务</span>
          </div>
          <div id="priorityCards" class="priority-grid"></div>
          <section id="personalWorkspacePanels" class="personal-workspace-grid embedded-work-grid" aria-label="当前执行任务"></section>
          <section id="currentOperationsPanel" class="current-operations-panel" aria-label="当前经营录入"></section>
        </section>

        <section id="riskExceptionSection" class="business-menu-section product-home-block" aria-label="风险异常">
          <div class="section-title">
            <h2>风险异常</h2>
            <span>当前卡点 / 延迟事项 / 异常业务 / 未完成闭环</span>
          </div>
          <section id="businessMenu" class="business-menu-grid" aria-label="风险与异常卡片"></section>
          <section id="sourceEvidenceRecords" class="source-evidence-grid embedded-data-grid" aria-label="来源记录"></section>
        </section>
      </section>
    </main>
    <script src="./oms-config.dev.js?v=workspace-ia-v1-20260713"></script>
    <script src="./oms-config.prod.js?v=workspace-ia-v1-20260713"></script>
    <script
      id="omsConfigScript"
      src="./oms-config.js?v=workspace-ia-v1-20260713"
      onload="document.documentElement.dataset.omsConfigScript='loaded'"
      onerror="document.documentElement.dataset.omsConfigScript='failed'"
    ></script>
    <script
      id="omsAppScript"
      src="./app.js?v=workspace-ia-v1-20260713"
      data-entry-file="app.js"
      onload="document.documentElement.dataset.omsAppScript='loaded'"
      onerror="document.documentElement.dataset.omsAppScript='failed'"
    ></script>
  </body>
</html>
