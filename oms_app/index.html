<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>凰家运营中心 OMS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="oms-shell" aria-label="凰家运营中心 OMS V1.1">
      <header class="oms-header">
        <div>
          <p class="eyebrow">凰家运营中心（OMS）V1.1</p>
          <h1 id="pageTitle">一个运营中心</h1>
          <p id="pageSubtitle" class="subtitle">11个人，每人一个工作台，最后拼成一个运营中心</p>
        </div>
        <div class="today-card" aria-label="今日">
          <span>今天</span>
          <strong id="todayText">2026年7月4日</strong>
        </div>
      </header>

      <section class="identity-lock" aria-label="当前登录身份">
        <span class="lock-dot" aria-hidden="true"></span>
        <div>
          <strong id="lockedUserName">BOSS</strong>
          <span id="lockedUserRole">经营总览入口</span>
        </div>
      </section>

      <section id="operatingCenter" class="workspace-grid" aria-label="11个岗位工作台"></section>

      <section id="unifiedOverview" class="unified-overview" aria-label="统一一视图">
        <div class="section-title">
          <h2>拼成一个运营中心（统一一视图）</h2>
          <p>各岗位独立处理自己的工作，BOSS 汇总查看经营全貌。</p>
        </div>
        <div class="overview-grid">
          <article>
            <span>经营总览</span>
            <strong id="metricRevenue">0</strong>
            <small>今日收款 / 目标差额</small>
          </article>
          <article>
            <span>房态总览</span>
            <strong id="metricRoom">0</strong>
            <small>今日入住 / 待排房</small>
          </article>
          <article>
            <span>财务总览</span>
            <strong id="metricFinance">0</strong>
            <small>审批 / 对账</small>
          </article>
          <article>
            <span>人效总览</span>
            <strong id="metricPeople">0</strong>
            <small>在岗 / 待跟进</small>
          </article>
          <article>
            <span>快速入口</span>
            <strong id="metricPending">0</strong>
            <small>pending_outbox</small>
          </article>
        </div>
      </section>

      <footer class="operating-principle">
        核心目标：不是盯客户，不是盯客户群，让每一位妈妈都日日被服务。
      </footer>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
