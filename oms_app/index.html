<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMS 个人工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="OMS Single User Workspace">
      <header class="app-header">
        <div>
          <p class="eyebrow">OMS</p>
          <h1 id="homeTitle">我的工作台</h1>
          <p class="subtitle">仅显示当前登录用户的工作内容</p>
        </div>
        <div class="identity-chip" aria-label="当前登录身份">
          <span class="lock-dot" aria-hidden="true"></span>
          <div>
            <strong id="lockedUserName">OMS</strong>
            <span id="lockedUserRole">个人工作台</span>
          </div>
        </div>
      </header>

      <section class="notice" aria-label="数据边界">
        您已登录当前个人工作台，数据仅对本人可见。
      </section>

      <section class="summary-strip" aria-label="今日概览">
        <article>
          <strong id="todoCount">0</strong>
          <span>我的待办</span>
        </article>
        <article>
          <strong id="taskCount">0</strong>
          <span>我的任务</span>
        </article>
        <article>
          <strong id="approvalCount">0</strong>
          <span>我的审批</span>
        </article>
        <article>
          <strong id="pendingCount">0</strong>
          <span>待同步</span>
        </article>
      </section>

      <section class="workspace-panel" aria-label="当前用户工作台">
        <div class="section-header">
          <h2>我的工作流</h2>
          <span id="workspaceStatus" class="status-pill">正常</span>
        </div>

        <div class="workspace-grid">
          <section class="panel">
            <h3>我的待办</h3>
            <div id="todoList" class="item-list"></div>
          </section>
          <section class="panel">
            <h3>我的任务</h3>
            <div id="taskList" class="item-list"></div>
          </section>
          <section class="panel">
            <h3>我的审批</h3>
            <div id="approvalList" class="item-list"></div>
          </section>
          <section class="panel">
            <h3>我的流程</h3>
            <div id="flowList" class="item-list"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
