<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMS 运营中心 V1.1</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://lf-scm-cn.feishucdn.com/lark/op/h5-js-sdk-1.5.38.js"></script>
  </head>
  <body>
    <main class="app-shell" aria-label="OMS Operating Center V1.1">
      <header class="app-header">
        <div>
          <p class="eyebrow">凰家运营中心（OMS）V1.1</p>
          <h1 id="homeTitle">11个人，每人一个工作台</h1>
          <p id="homeSubtitle" class="subtitle">最后拼成一个运营中心</p>
        </div>
        <div class="identity-chip" aria-label="当前飞书身份">
          <span class="lock-dot" aria-hidden="true"></span>
          <div>
            <strong id="lockedUserName">OMS</strong>
            <span id="lockedUserRole">Feishu identity</span>
          </div>
        </div>
      </header>

      <section class="principle-strip" aria-label="运营中心第一原则">
        运营中心第一原则：不要落下客户，不要遗忘客户
      </section>

      <section class="boss-band" aria-label="顶层主理工作台">
        <div id="bossCard" class="boss-card"></div>
      </section>

      <section class="section-title" aria-label="中层岗位工作台">
        <h2>10个岗位工作台</h2>
        <span>每个岗位独立卡片，统一栅格</span>
      </section>
      <section id="workspaceCards" class="workspace-grid-v11" aria-label="岗位工作台列表"></section>

      <section class="overview-band" aria-label="底层统一经营中心总览">
        <div class="section-title">
          <h2>拼成一个运营中心（统一视图）</h2>
          <span id="workspaceStatus">runtime data</span>
        </div>
        <div id="overviewGrid" class="overview-grid"></div>
        <div id="quickLinks" class="quick-links"></div>
      </section>
    </main>
    <script src="./oms-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
