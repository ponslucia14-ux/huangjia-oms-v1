name: Deploy OMS App

on:
  push:
    branches:
      - main
    paths:
      - "oms_app/**"
      - ".github/workflows/deploy-oms-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oms-app-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload OMS App
        uses: actions/upload-pages-artifact@v3
        with:
          path: oms_app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
