name: Deploy OMS App

on:
  push:
    branches:
      - main
    paths:
      - "oms_app/**"
      - ".github/workflows/deploy-oms-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oms-app-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish OMS App to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./oms_app
          publish_branch: gh-pages
          force_orphan: true
